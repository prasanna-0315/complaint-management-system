<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raise Complaint - Complaint Management System</title>
  <link rel="stylesheet" href="student.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>

  <div class="student-dashboard">
    <!-- SIDEBAR -->
    <aside class="student-sidebar">
      <h2 class="logo"><i class="fas fa-file-invoice"></i> CMS</h2>
      <nav>
        <a href="raise.html" class="active">
          <i class="fas fa-pencil-alt"></i> Raise Complaint
        </a>
        <a href="student_dashboard.html?tab=track">
          <i class="fas fa-search"></i> Track Status
        </a>

        <a href="blueprint.html">
          <i class="fas fa-map-marked-alt"></i> Campus Blueprint
        </a>
        <a href="student_dashboard.html?tab=profile">
          <i class="fas fa-user-circle"></i> Profile
        </a>
        <a href="#" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </a>
      </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="student-main">
      <header class="student-top-bar">
        <h1><i class="fas fa-pencil-alt"></i> Raise Complaint</h1>
        <span class="student-name" id="studentName">
          <i class="fas fa-user-circle"></i> Welcome, Student
        </span>
      </header>

      <div class="dashboard-tabs">
        <button class="tab-btn active" onclick="location.href='raise.html'">
          <i class="fas fa-plus-circle"></i> Raise Complaint
        </button>
        <button class="tab-btn" onclick="location.href='student_dashboard.html?tab=track'">
          <i class="fas fa-list"></i> Track Status
        </button>
        <button class="tab-btn" onclick="location.href='student_dashboard.html?tab=profile'">
          <i class="fas fa-user"></i> Profile
        </button>
      </div>

      <!-- RAISE COMPLAINT TAB -->
      <div id="raiseTab" class="tab-content active">
        <div class="complaint-form-card">
          <h2><i class="fas fa-exclamation-circle"></i> Submit a Complaint</h2>

          <div class="success-message" id="successMessage" style="display:none;">
            <i class="fas fa-check-circle"></i> Complaint submitted successfully!
          </div>

          <form id="complaintForm" onsubmit="submitComplaint(event)">
            <div class="form-group">
              <label for="complaintType"><i class="fas fa-tag"></i> Type of Complaint *</label>
              <select id="complaintType" required onchange="handleTypeChange()">
                <option value="">Select complaint type</option>
                <option value="Electricity & Power"> Electricity & Power</option>
                <option value="Water & Sanitation"> Water & Sanitation</option>
                <option value="Road & Infrastructure"> Road & Infrastructure</option>
                <option value="Food & Mess"> Food & Mess</option>
                <option value="Hostel & Accommodation"> Hostel & Accommodation</option>
                <option value="Library & Resources"> Library & Resources</option>
                <option value="Transport & Vehicles"> Transport & Vehicles</option>
                <option value="Academic & Curriculum"> Academic & Curriculum</option>
                <option value="Faculty & Staff Conduct"> Faculty & Staff Conduct</option>
                <option value="Health & Medical"> Health & Medical</option>
                <option value="Safety & Security"> Safety & Security</option>
                <option value="IT & Technical"> IT & Technical</option>
                <option value="Sports & Recreation"> Sports & Recreation</option>
                <option value="Administrative Issues"> Administrative Issues</option>
                <option value="Others"> Others</option>
              </select>
            </div>

            <div class="form-group hidden" id="subCategoryGroup">
              <label for="subCategory"><i class="fas fa-list-ul"></i> Specific Issue Type *</label>
              <select id="subCategory" onchange="handleSubCategoryChange()">
                <option value="">Select Specific Issue</option>
              </select>
            </div>

            <div class="form-group hidden" id="estateCategoryGroup">
              <label for="estateCategory"><i class="fas fa-building"></i> Location Category *</label>
              <select id="estateCategory" required onchange="handleEstateChange()">
                <option value="">Select College or Hostel</option>
                <option value="College">College</option>
                <option value="Hostel">Hostel</option>
              </select>
            </div>

            <!-- COLLEGE FIELDS -->
            <div id="collegeFields" class="hidden">
              <div class="form-group">
                <label for="collegeBlock">College Block *</label>
                <select id="collegeBlock">
                  <option value="">Select Block</option>
                  <option value="Main Building">Main Building</option>
                  <option value="Science Block">Science Block</option>
                  <option value="Engineering Block">Engineering Block</option>
                  <option value="Library">Library</option>
                  <option value="Sports Complex">Sports Complex</option>
                </select>
              </div>
              <div class="form-group">
                <label for="collegeFloor">Floor *</label>
                <select id="collegeFloor">
                  <option value="">Select Floor</option>
                  <option value="Ground Floor">Ground Floor</option>
                  <option value="1st Floor">1st Floor</option>
                  <option value="2nd Floor">2nd Floor</option>
                  <option value="3rd Floor">3rd Floor</option>
                </select>
              </div>
              <div class="form-group">
                <label for="collegeRoomType">Room/Area Type *</label>
                <select id="collegeRoomType">
                  <option value="">Select Room/Area Type</option>
                  <option value="Classroom 101">Classroom 101</option>
                  <option value="Classroom 102">Classroom 102</option>
                  <option value="Classroom 201">Classroom 201</option>
                  <option value="Classroom 202">Classroom 202</option>
                  <option value="Lab 1">Lab 1</option>
                  <option value="Lab 2">Lab 2</option>
                  <option value="Staff Room">Staff Room</option>
                  <option value="Washroom">Washroom</option>
                  <option value="Corridor">Corridor</option>
                </select>
              </div>
            </div>

            <!-- HOSTEL FIELDS -->
            <div id="hostelFields" class="hidden">
              <div class="form-group">
                <label for="hostelBlock">Hostel Block *</label>
                <select id="hostelBlock">
                  <option value="">Select Hostel</option>
                  <option value="Boys Hostel A">Boys Hostel A</option>
                  <option value="Boys Hostel B">Boys Hostel B</option>
                  <option value="Girls Hostel A">Girls Hostel A</option>
                  <option value="Girls Hostel B">Girls Hostel B</option>
                </select>
              </div>
              <div class="form-group">
                <label for="hostelFloor">Floor *</label>
                <select id="hostelFloor">
                  <option value="">Select Floor</option>
                  <option value="Ground Floor">Ground Floor</option>
                  <option value="1st Floor">1st Floor</option>
                  <option value="2nd Floor">2nd Floor</option>
                  <option value="3rd Floor">3rd Floor</option>
                </select>
              </div>
              <div class="form-group">
                <label for="hostelRoom">Room No *</label>
                <select id="hostelRoom">
                  <option value="">Select Room</option>
                  <option value="Room 101">Room 101</option>
                  <option value="Room 102">Room 102</option>
                  <option value="Room 103">Room 103</option>
                  <option value="Room 201">Room 201</option>
                  <option value="Room 202">Room 202</option>
                  <option value="Room 203">Room 203</option>
                  <option value="Room 301">Room 301</option>
                  <option value="Washroom">Washroom</option>
                  <option value="Common Room">Common Room</option>
                  <option value="Mess Area">Mess Area</option>
                </select>
              </div>
            </div>

            <!-- GENERIC LOCATION (For non-building specific issues) -->
            <div id="genericLocationField" class="hidden">
              <div class="form-group">
                <label for="genericLocation">Specific Location / Details *</label>
                <input type="text" id="genericLocation" placeholder="e.g., Near Main Gate, Route 4, Name of Item">
              </div>
            </div>

            <div class="form-group">
              <label for="description">Explanation/Description (Optional)</label>
              <textarea id="description" placeholder="Provide any additional details..."></textarea>
            </div>

            <button type="submit" class="submit-btn"><i class="fas fa-paper-plane"></i> Submit Complaint</button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Prevent back button with logout prompt
    history.pushState(null, null, location.href);
    window.onpopstate = function () {
      if (confirm("Confirm to logout?")) {
        logout();
      } else {
        history.pushState(null, null, location.href);
      }
    };

    // Check auth
    document.addEventListener("DOMContentLoaded", function () {
      const studentId = sessionStorage.getItem("studentId");
      if (!studentId) {
        window.location.replace("student_login.html");
        return;
      }
      document.getElementById("studentName").textContent = "Welcome, " + studentId;
    });

    // Also check on pageshow for BFCache
    window.addEventListener('pageshow', function (event) {
      if (event.persisted && !sessionStorage.getItem("studentId")) {
        window.location.replace("student_login.html");
      }
    });

    function logout() {
      sessionStorage.clear();
      window.location.replace("../index.html");
    }

    const subCategories = {
      "Electricity & Power": ["Fan", "Tube Light/Bulb", "AC", "Switchboard", "Wiring/Short Circuit", "Other"],
      "Water & Sanitation": ["Drinking Water Issue", "Washroom Cleanliness", "Plumbing/Leakage", "No Water Supply", "Drainage/Blockage", "Other"],
      "Road & Infrastructure": ["Potholes", "Broken Pavement", "Damaged Furniture", "Construction Issue", "Other"],
      "Food & Mess": ["Quality of Food", "Hygiene/Cleanliness", "Delayed Service", "Menu Issue", "Other"],
      "Hostel & Accommodation": ["Room Cleaning", "Bed/Furniture repair", "Pest Control", "Wi-Fi Issue in Hostel", "Other"],
      "Library & Resources": ["Unavailability of Books", "E-Resource Access", "Seating Issue", "Noise Complaint", "Other"],
      "Transport & Vehicles": ["Bus Delay", "Bus Maintenance", "Driver Behavior", "Route Issue", "Other"],
      "Academic & Curriculum": ["Schedule Conflict", "Course Material Issue", "Grade Discrepancy", "Exam Issue", "Other"],
      "Faculty & Staff Conduct": ["Unprofessional Behavior", "Absenteeism", "Partiality/Bias", "Harassment", "Other"],
      "Health & Medical": ["First Aid Availability", "Medicine Unavailability", "Ambulance Issue", "Doctor/Staff Issue", "Other"],
      "Safety & Security": ["Theft", "Unauthorized Entry", "Misbehavior by Guards", "Lack of Lighting", "Other"],
      "IT & Technical": ["Wi-Fi Unavailability", "Lab Computers Issue", "ERP/Portal Issue", "Projector Issue", "Other"],
      "Sports & Recreation": ["Equipment Damage/Unavailability", "Ground Maintenance", "Timings Issue", "Other"],
      "Administrative Issues": ["Fee Payment Issue", "Document Issuance Delay", "Hall Ticket Issue", "ID Card Issue", "Other"]
    };

    const categoryRestrictions = {
      "Hostel & Accommodation": "Hostel",
      "Library & Resources": "College",
      "Academic & Curriculum": "College",
      "Faculty & Staff Conduct": "College",
      "Sports & Recreation": "College",
      "Administrative Issues": "College",
      "Transport & Vehicles": "College"
    };

    const structuredLocationTypes = [
      "Electricity & Power",
      "Water & Sanitation",
      "Hostel & Accommodation",
      "Library & Resources",
      "Health & Medical",
      "Safety & Security",
      "IT & Technical",
      "Sports & Recreation"
    ];

    function handleTypeChange() {
      const type = document.getElementById("complaintType").value;
      const subGroup = document.getElementById("subCategoryGroup");
      const subSelect = document.getElementById("subCategory");
      const estateGroup = document.getElementById("estateCategoryGroup");
      const estateDropdown = document.getElementById("estateCategory");

      // Reset subsequent fields
      subSelect.innerHTML = '<option value="">Select Specific Issue</option>';
      estateGroup.classList.add("hidden");
      document.getElementById("collegeFields").classList.add("hidden");
      document.getElementById("hostelFields").classList.add("hidden");
      const genericField = document.getElementById("genericLocationField");
      if (genericField) genericField.classList.add("hidden");

      if (type && subCategories[type]) {
        subGroup.classList.remove("hidden");
        subSelect.required = true;
        subCategories[type].forEach(issue => {
          const option = document.createElement("option");
          option.value = issue;
          option.textContent = issue;
          subSelect.appendChild(option);
        });
      } else {
        subGroup.classList.add("hidden");
        subSelect.required = false;
        
        // No subcategory needed, go straight to estate/location selection
        if (type) {
           handleSubCategoryChange();
        }
      }
    }

    function handleSubCategoryChange() {
      const type = document.getElementById("complaintType").value;
      const subSelect = document.getElementById("subCategory");
      const estateGroup = document.getElementById("estateCategoryGroup");
      const estateDropdown = document.getElementById("estateCategory");

      // Only show location if either there are no subcategories, or a subcategory is selected
      if (!type || (subCategories[type] && !subSelect.value)) {
        estateGroup.classList.add("hidden");
        return;
      }

      estateGroup.classList.remove("hidden");

      // Handle auto-selection and locking of College/Hostel
      if (type && categoryRestrictions[type]) {
        estateDropdown.value = categoryRestrictions[type];
        estateDropdown.disabled = true;
      } else {
        estateDropdown.disabled = false;
        estateDropdown.value = "";
      }

      // Always trigger estate change to review lower fields
      handleEstateChange();
    }

    function handleEstateChange() {
      const estate = document.getElementById("estateCategory").value;
      const type = document.getElementById("complaintType").value;
      const collegeFields = document.getElementById("collegeFields");
      const hostelFields = document.getElementById("hostelFields");
      const genericField = document.getElementById("genericLocationField");
      const genInput = document.getElementById("genericLocation");

      // Hide all initially
      collegeFields.classList.add("hidden");
      hostelFields.classList.add("hidden");
      if (genericField) genericField.classList.add("hidden");

      document.getElementById("collegeBlock").required = false;
      document.getElementById("collegeFloor").required = false;
      document.getElementById("collegeRoomType").required = false;
      document.getElementById("hostelBlock").required = false;
      document.getElementById("hostelFloor").required = false;
      document.getElementById("hostelRoom").required = false;
      if (genInput) genInput.required = false;

      if (!estate || !type) return;

      if (!structuredLocationTypes.includes(type)) {
        if (genericField) genericField.classList.remove("hidden");
        if (genInput) genInput.required = true;
        return;
      }

      if (estate === "College") {
        collegeFields.classList.remove("hidden");
        document.getElementById("collegeBlock").required = true;
        document.getElementById("collegeFloor").required = true;
        document.getElementById("collegeRoomType").required = true;
      } else if (estate === "Hostel") {
        hostelFields.classList.remove("hidden");
        document.getElementById("hostelBlock").required = true;
        document.getElementById("hostelFloor").required = true;
        document.getElementById("hostelRoom").required = true;
      }
    }

    async function submitComplaint(event) {
      event.preventDefault();

      const studentId = sessionStorage.getItem("studentId");
      if (!studentId) {
        alert("Student not logged in. Please login again.");
        window.location.replace("student_login.html");
        return;
      }

      const category = document.getElementById("complaintType").value;
      const estate = document.getElementById("estateCategory").value;
      let descriptionStr = document.getElementById("description").value.trim();

      // Check if subCategory exists
      const subGrp = document.getElementById("subCategoryGroup");
      if (!subGrp.classList.contains("hidden")) {
        const specificIssue = document.getElementById("subCategory").value;
        if (specificIssue) {
          descriptionStr = `[Issue: ${specificIssue}] ` + descriptionStr;
        }
      }

      // Ensure description string isn't completely empty for backend schema validation
      if (!descriptionStr.trim()) {
        descriptionStr = "No additional details provided.";
      }

      let locationStr = estate; // "College" or "Hostel"
      if (!structuredLocationTypes.includes(category)) {
        const genLoc = document.getElementById("genericLocation").value;
        locationStr = `${estate}: ${genLoc}`;
      } else if (estate === "College") {
        const blk = document.getElementById("collegeBlock").value;
        const flr = document.getElementById("collegeFloor").value;
        const rm = document.getElementById("collegeRoomType").value;
        locationStr = `College: ${blk}, ${flr}, ${rm}`;
      } else if (estate === "Hostel") {
        const blk = document.getElementById("hostelBlock").value;
        const flr = document.getElementById("hostelFloor").value;
        const rm = document.getElementById("hostelRoom").value;
        locationStr = `Hostel: ${blk}, ${flr}, ${rm}`;
      }

      const complaintData = {
        studentName: studentId, // In reality this should be the actual name, but tracking uses studentId
        studentId: studentId,
        category: category,
        location: locationStr,
        description: descriptionStr
      };

      try {
        const response = await fetch("/complaint", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(complaintData)
        });

        if (response.ok) {
          const result = await response.json();
          const successMsg = document.getElementById("successMessage");
          successMsg.style.display = "block";
          successMsg.textContent = `✓ Complaint submitted successfully! ID: ${result._id}`;

          document.getElementById("complaintForm").reset();
          handleTypeChange();
          handleEstateChange();

          setTimeout(() => {
            successMsg.style.display = "none";
          }, 4000);
        } else {
          const error = await response.json();
          alert("Failed to submit complaint: " + (error.message || "Unknown error"));
        }
      } catch (error) {
        console.error("Error:", error);
        alert("Error submitting complaint. Server might be down.");
      }
    }
  </script>

</body>

</html>
