<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard-container">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2 class="logo">Admin Panel</h2>

    <nav>
  <a href="admin_dashboard.html" class="active">Dashboard</a>
  <a href="complaints.html">Complaints</a>
  <a href="admin_login.html">Logout</a>
</nav>

  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- HEADER -->
    <header class="top-bar">
      <h1>Dashboard</h1>
      <span class="admin-name">Welcome, Admin</span>
    </header>

    <!-- STATS -->
    <section class="stats-grid">

      <div class="stat-card">
  <h3>Total Complaints</h3>
  <h1 id="totalComplaints">0</h1>
</div>

<div class="stat-card pending">
  <h3>Pending</h3>
  <h1 id="pendingComplaints">0</h1>
</div>
<div class="stat-card progress">
  <h3>In Progress</h3>
  <h1 id="progressComplaints">0</h1>
</div>
<div class="stat-card resolved">
  <h3>Resolved</h3>
  <h1 id="resolvedComplaints">0</h1>
</div>

    </section>

  </main>

</div>
<script>

async function loadDashboardStats(){

  const res = await fetch("http://localhost:5000/complaint");
  const complaints = await res.json();

  const total = complaints.length;

  const pending = complaints.filter(c => c.status === "Pending").length;

  const progress = complaints.filter(c => c.status === "In Progress").length;

  const resolved = complaints.filter(c => c.status === "Resolved").length;

  document.getElementById("totalComplaints").textContent = total;
  document.getElementById("pendingComplaints").textContent = pending;
  document.getElementById("progressComplaints").textContent = progress;
  document.getElementById("resolvedComplaints").textContent = resolved;

}

loadDashboardStats();

</script>
</body>
</html>
